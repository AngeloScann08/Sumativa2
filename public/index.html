<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sumativa 2 - Subir Archivos</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a1a2a, #1e3c72);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            width: 400px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        h1, h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        /* BOTÓN DE SELECCIONAR ARCHIVO ESTILIZADO */
        .file-input-container {
            position: relative;
            width: 100%;
            margin-bottom: 10px;
        }

        .file-input {
            opacity: 0;
            position: absolute;
            width: 100%;
            height: 45px;
            cursor: pointer;
        }

        .file-label {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #00b7ff;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .file-label:hover {
            background: #0095d1;
        }

        #nombreArchivo {
            margin-top: 5px;
            font-size: 14px;
            opacity: 0.8;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1e90ff;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #187bcd;
        }

        #mensaje {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            display: none;
            text-align: center;
            font-weight: bold;
        }

        .ok {
            background: #28a745;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 15px;
        }

        li {
            background: rgba(255,255,255,0.15);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        a {
            color: #00ffea;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Subir archivo</h1>

        <form id="formSubida" action="/subir" method="POST" enctype="multipart/form-data">

            <!-- INPUT FILE ESTILIZADO -->
            <div class="file-input-container">
                <input type="file" name="archivo" class="file-input" id="archivo" required>
                <label for="archivo" class="file-label">📁 Seleccionar archivo</label>
            </div>

            <div id="nombreArchivo">Ningún archivo seleccionado</div>

            <button type="submit">⬆️ Subir archivo</button>
        </form>

        <div id="mensaje"></div>

        <hr>

        <h2>Archivos almacenados</h2>
        <button onclick="cargarArchivos()">📄 Mostrar archivos</button>

        <ul id="lista"></ul>
    </div>

    <script>
        // Mostrar nombre del archivo seleccionado
        const archivoInput = document.getElementById("archivo");
        const nombreArchivo = document.getElementById("nombreArchivo");

        archivoInput.addEventListener("change", () => {
            nombreArchivo.innerText = archivoInput.files.length > 0
                ? archivoInput.files[0].name
                : "Ningún archivo seleccionado";
        });

        // Mostrar mensaje bonito al subir archivo
        const form = document.getElementById("formSubida");
        const mensaje = document.getElementById("mensaje");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const data = new FormData(form);

            const res = await fetch("/subir", {
                method: "POST",
                body: data
            });

            const texto = await res.text();

            mensaje.innerText = texto;
            mensaje.className = "ok";
            mensaje.style.display = "block";

            form.reset();
            nombreArchivo.innerText = "Ningún archivo seleccionado";
        });

        // Cargar lista de archivos
        function cargarArchivos() {
            fetch("/archivos")
                .then(res => res.json())
                .then(data => {
                    const lista = document.getElementById("lista");
                    lista.innerHTML = "";

                    data.forEach(nombre => {
                        const li = document.createElement("li");
                        li.innerHTML = `
                            ${nombre}
                            <a href="/descargar/${nombre}">Descargar</a>
                        `;
                        lista.appendChild(li);
                    });
                });
        }
    </script>
</body>
</html>
